name: vedge_patient
description: "Vedge for Patients — consumer-facing health records, results, and appointments."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Networking
  dio: ^5.7.0

  # Secure storage for JWT (keychain / EncryptedSharedPreferences)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Fonts (Fraunces + Inter) and icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Date / number formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
