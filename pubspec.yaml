name: vedge_patient
description: "Vedge for Patients — consumer-facing health records, results, and appointments."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Networking
  dio: ^5.7.0

  # Secure storage for JWT (keychain / EncryptedSharedPreferences)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Fonts (Fraunces + Inter) and icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Date / number formatting
  intl: ^0.19.0

  # Used by the teleconsult flow (W5.6b) to launch the Paystack checkout URL
  # and the Daily.co room in the device browser. Full in-app WebRTC is a
  # follow-up (W5.6c).
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

# Regenerate after any change to assets/brand/icon_source.png:
#   dart run flutter_launcher_icons
# Source PNG is kept byte-identical across vedge_frontend/public/brand/,
# vedge_staff/assets/brand/, and vedge_patient/assets/brand/ so the
# browser tab, the staff app icon, and the patient app icon all match.
# See vedge_frontend/BRANDING.md for the canonical composition.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/icon_source.png
  remove_alpha_ios: true
  adaptive_icon_background: "#0E2319"
  adaptive_icon_foreground: assets/brand/icon_source.png

flutter:
  uses-material-design: true
